# ═══════════════════════════════════════════════════════════════
# FAMS — Crimson Vault · Keycloak Theme Properties
# ═══════════════════════════════════════════════════════════════

# Inherit from the base Keycloak login theme for anything not overridden
parent=keycloak
import=common/keycloak

# Register the stylesheet (Tailwind CDN handles utility classes;
# this file contains all custom component CSS)
styles=css/login.css

# Viewport meta tag
meta=viewport==width=device-width,initial-scale=1

# Theme display name (shown in Keycloak Admin Console)
displayName=FAMS Crimson Vault

# Internationalization — inherit Keycloak's default message bundles
internationalizationEnabled=true
supportedLocales=en
defaultLocale=en
